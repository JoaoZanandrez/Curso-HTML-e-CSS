<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bolder;
            padding: 8px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }

        .destaque {
            background-color: blueviolet;
        }

        col.cnome {
            background-color: blueviolet;
        }

        col.csexo, col.cidade {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>Exercicios de tabela</h1>


    <table>
        <colgroup>
            <col class="cnome">
            <col class="csexo">
            <col class="cidade">
            <col class="cprof">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>João</td>
            <td>M</td>
            <td>28</td>
            <td>Programador</td>
        </tr>
        <tr>
            <td>Gustavo</td>
            <td>M</td>
            <td>25</td>
            <td>Musico</td>
        </tr>
        <tr>
            <td>Clair</td>
            <td>M</td>
            <td>56</td>
            <td>Professor</td>
        </tr>
        <tr>
            <td>Josilene</td>
            <td>F</td>
            <td>56</td>
            <td>Professora</td>
        </tr>
        <tr>
            <td>Caio</td>
            <td>M</td>
            <td>27</td>
            <td>Desenhista</td>
        </tr>
        <tr>
            <td>Marco Antonio</td>
            <td>M</td>
            <td>21</td>
            <td>Jogador</td>
        </tr>
    </table>
</body>
</html>
